services:
  deck-builder:
    build: .
    volumes:
      - ./output:/app/output
      - ./data:/app/data
    environment:
      - COMMANDER=Ms. Bumbleflower
      - THEME=
      - BRACKET=0
      - EPOCHS=200
      - COLLECTION=
      - PREFER_OWNED=false
      - FORCE_TRAIN=false
      - REFRESH=false
    entrypoint: ["python", "-m", "mtg_deck_builder"]
    command: []
